<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarkAI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3347;
      --accent:    #6366f1;
      --accent-hl: #818cf8;
      --text:      #e8eaf6;
      --muted:     #8b90a7;
      --user-bg:   #6366f1;
      --ai-bg:     #1a1d27;
      --radius:    14px;
      --font:      'Inter', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 8px;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: transparent;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: -2px;
    }

    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 13.5px;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
      text-align: left;
    }
    .new-chat-btn:hover { background: var(--surface2); }

    .sidebar-section {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 10px 4px;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .history-item {
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.15s, color 0.15s;
    }
    .history-item:hover, .history-item.active {
      background: var(--surface2);
      color: var(--text);
    }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .model-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12.5px;
      color: var(--muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      box-shadow: 0 0 6px #22c55e88;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status-dot.offline {
      background: #ef4444;
      box-shadow: 0 0 6px #ef444488;
    }

    .status-label {
      transition: color 0.3s;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .topbar-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 24px;
      text-align: center;
      color: var(--muted);
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: transparent;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      overflow: hidden;
      box-shadow: 0 8px 16px rgba(0,0,0,0.25);
    }

    .empty-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .empty-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
    }

    .empty-sub {
      font-size: 14px;
      max-width: 380px;
    }

    .suggestions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
      max-width: 520px;
      width: 100%;
    }

    .suggestion-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
      line-height: 1.4;
    }
    .suggestion-card:hover {
      background: var(--surface2);
      border-color: var(--accent);
    }
    .suggestion-card .s-icon {
      font-size: 18px;
      margin-bottom: 6px;
      display: block;
    }

    .msg-row {
      display: flex;
      padding: 12px 24px;
      gap: 14px;
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      margin-top: 2px;
      overflow: hidden;
    }

    .avatar.user-av { background: var(--user-bg); color: #fff; }
    
    .avatar.ai-av { 
      background: transparent;
      border: 1px solid var(--border);
    }
    
    .avatar.ai-av img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14.5px;
      line-height: 1.65;
    }

    .bubble.user-bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.ai-bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
    }
    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    .input-area {
      padding: 16px 24px 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrap {
      max-width: 820px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font);
      font-size: 14.5px;
      color: var(--text);
      line-height: 1.6;
      max-height: 200px;
      min-height: 24px;
      overflow-y: auto;
    }

    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      border: none;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
      font-size: 16px;
    }
    .send-btn:hover { background: var(--accent-hl); }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; }

    .input-footer {
      text-align: center;
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 8px;
    }

    .error-banner {
      background: #3b1515;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      font-size: 13px;
      padding: 10px 16px;
      border-radius: 8px;
      max-width: 820px;
      margin: 0 auto 8px;
      display: none;
    }
    .error-banner.show { display: block; }

    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .msg-row { padding: 10px 14px; }
      .input-area { padding: 12px 14px 16px; }
      .suggestions { grid-template-columns: 1fr; }
      .bubble { max-width: 90%; }
    }
  </style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">
        <img src="icon.png" alt="Mark AI Logo" />
      </div>
      <div>
        <div class="logo-text">Mark</div>
        <div class="logo-sub">AI Model</div>
      </div>
    </div>

    <button class="new-chat-btn" onclick="newChat()">
      ✏️&nbsp;&nbsp;New chat
    </button>

    <div class="sidebar-section">Recent</div>

    <div class="history-list" id="historyList"></div>

    <div class="sidebar-footer">
      <div class="model-badge">
        <span class="status-dot offline" id="statusDot"></span>
        <span class="status-label" id="statusLabel">Mark is offline</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <div class="topbar-title">Chat with Mark</div>
        <div class="topbar-meta" id="topbarMeta">New conversation</div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" title="Clear chat" onclick="clearChat()">🗑️</button>
      </div>
    </header>

    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <img src="icon.png" alt="Mark AI Logo" />
        </div>
        <div class="empty-title">Hey, I'm Mark</div>
        <div class="empty-sub">Your personal AI model — ready to chat.</div>
        <div class="suggestions">
          <button class="suggestion-card" onclick="sendSuggestion(this)">
            <span class="s-icon">💡</span> What is your name?
          </button>
          <button class="suggestion-card" onclick="sendSuggestion(this)">
            <span class="s-icon">🧠</span> What can you help me with?
          </button>
          <button class="suggestion-card" onclick="sendSuggestion(this)">
            <span class="s-icon">🔬</span> Hi!
          </button>
          <button class="suggestion-card" onclick="sendSuggestion(this)">
            <span class="s-icon">🚀</span> what is 1+1
          </button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="error-banner" id="errorBanner"></div>
      <div class="input-wrap">
        <textarea
          id="inputBox"
          placeholder="Message Mark…"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
          ➤
        </button>
      </div>
      <div class="input-footer">
        Mark may make mistakes.
      </div>
    </div>
  </main>
</div>

<script>
  const MARK_API_URL = "https://markai-0mfo.onrender.com/chat";
  const MARK_HEALTH_URL = "https://markai-0mfo.onrender.com/health";
  const MARK_API_KEY = "";

  let sessions = JSON.parse(localStorage.getItem("mark_sessions") || "[]");
  let currentIdx = sessions.length ? sessions.length - 1 : -1;
  let isLoading = false;
  let isOnline = false;

  async function checkStatus() {
    const dot = document.getElementById("statusDot");
    const label = document.getElementById("statusLabel");
    try {
      const res = await fetch(MARK_HEALTH_URL, { signal: AbortSignal.timeout(3000) });
      if (res.ok) {
        isOnline = true;
        dot.className = "status-dot";
        label.textContent = "Mark is online";
      } else {
        throw new Error("bad status");
      }
    } catch {
      isOnline = false;
      dot.className = "status-dot offline";
      label.textContent = "Mark is offline";
    }
  }

  checkStatus();
  setInterval(checkStatus, 10000);

  function renderHistory() {
    const list = document.getElementById("historyList");
    list.innerHTML = "";
    sessions.forEach((s, i) => {
      const item = document.createElement("div");
      item.className = "history-item" + (i === currentIdx ? " active" : "");
      item.textContent = s.title || "New chat";
      item.onclick = () => loadSession(i);
      list.appendChild(item);
    });
  }

  function loadSession(idx) {
    currentIdx = idx;
    const s = sessions[idx];
    document.getElementById("emptyState").style.display = "none";
    const msgs = document.getElementById("messages");
    [...msgs.querySelectorAll(".msg-row")].forEach(el => el.remove());
    s.messages.forEach(m => appendBubble(m.role, m.content, false));
    renderHistory();
    updateTopbar(s);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function updateTopbar(session) {
    const meta = document.getElementById("topbarMeta");
    const count = session ? session.messages.length : 0;
    meta.textContent = count ? `${count} message${count !== 1 ? "s" : ""}` : "New conversation";
  }

  function newChat() {
    currentIdx = -1;
    const msgs = document.getElementById("messages");
    [...msgs.querySelectorAll(".msg-row")].forEach(el => el.remove());
    document.getElementById("emptyState").style.display = "flex";
    renderHistory();
    updateTopbar(null);
  }

  function clearChat() {
    if (currentIdx >= 0) {
      sessions.splice(currentIdx, 1);
      localStorage.setItem("mark_sessions", JSON.stringify(sessions));
    }
    newChat();
  }

  function sendSuggestion(btn) {
    const text = btn.querySelector(".s-icon")
      ? btn.textContent.trim().replace(/^\S+\s*/, "")
      : btn.textContent.trim();
    document.getElementById("inputBox").value = text;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 200) + "px";
  }

  function appendBubble(role, text, animate = true) {
    const empty = document.getElementById("emptyState");
    if (empty) empty.style.display = "none";
    const msgs = document.getElementById("messages");
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;
    if (!animate) row.style.animation = "none";
    const av = document.createElement("div");
    av.className = `avatar ${role === "user" ? "user-av" : "ai-av"}`;
    
    if (role === "user") {
      av.textContent = "Y";
    } else {
      av.innerHTML = `<img src="icon.png" alt="AI" />`;
    }

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role === "user" ? "user-bubble" : "ai-bubble"}`;
    bubble.innerHTML = formatText(text);
    row.appendChild(av);
    row.appendChild(bubble);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    return bubble;
  }

  function formatText(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g, "<em>$1</em>")
      .replace(/`(.+?)`/g, "<code style='background:#2e3347;padding:1px 5px;border-radius:4px;font-size:13px;'>$1</code>")
      .replace(/\n/g, "<br>");
  }

  function showTyping() {
    const msgs = document.getElementById("messages");
    const row = document.createElement("div");
    row.className = "msg-row assistant";
    row.id = "typingRow";
    const av = document.createElement("div");
    av.className = "avatar ai-av";
    av.innerHTML = `<img src="icon.png" alt="AI" />`;
    const bubble = document.createElement("div");
    bubble.className = "bubble ai-bubble";
    bubble.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    row.appendChild(av);
    row.appendChild(bubble);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typingRow");
    if (t) t.remove();
  }

  function showError(msg) {
    const el = document.getElementById("errorBanner");
    el.textContent = "⚠️ " + msg;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 5000);
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById("inputBox");
    const text = input.value.trim();
    if (!text) return;

    input.value = "";
    input.style.height = "auto";
    document.getElementById("sendBtn").disabled = true;
    isLoading = true;

    if (currentIdx === -1) {
      sessions.push({ title: text.slice(0, 36) + (text.length > 36 ? "…" : ""), messages: [] });
      currentIdx = sessions.length - 1;
    }

    const session = sessions[currentIdx];
    session.messages.push({ role: "user", content: text });
    appendBubble("user", text);
    showTyping();
    renderHistory();

    localStorage.setItem("mark_sessions", JSON.stringify(sessions));

    try {
      const body = {
        message: text,
        history: session.messages.slice(0, -1),
        session_id: currentIdx,
      };
      const headers = { "Content-Type": "application/json" };
      if (MARK_API_KEY) headers["Authorization"] = `Bearer ${MARK_API_KEY}`;
      const res = await fetch(MARK_API_URL, { method: "POST", headers, body: JSON.stringify(body) });
      if (!res.ok) throw new Error(`Server returned ${res.status}`);
      const data = await res.json();
      const reply = data.response ?? data.reply ?? data.text ?? data.message ?? data.output ?? JSON.stringify(data);
      removeTyping();
      session.messages.push({ role: "assistant", content: reply });
      appendBubble("assistant", reply);
    } catch (err) {
      removeTyping();
      const errMsg = err.message.includes("Failed to fetch")
        ? `Mark AI is offline. Make sure your API URL is correct and running.`
        : err.message;
      showError(errMsg);
      const fallback = "Mark AI is currently unable to connect to the server.";
      session.messages.push({ role: "assistant", content: fallback });
      appendBubble("assistant", fallback);
    }

    localStorage.setItem("mark_sessions", JSON.stringify(sessions));
    updateTopbar(session);
    renderHistory();
    document.getElementById("sendBtn").disabled = false;
    isLoading = false;
    
    document.getElementById("inputBox").focus();
  }

  document.addEventListener("DOMContentLoaded", () => {
    renderHistory();
    if (sessions.length) {
      loadSession(sessions.length - 1);
    }
  });
</script>
</body>
</html>
